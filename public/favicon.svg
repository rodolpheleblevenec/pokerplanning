<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Fond carré arrondi bleu -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>

  <!-- Carte arrière gauche (inclinée -10°) -->
  <rect x="4" y="7" width="16" height="21" rx="2.5" fill="#1d4ed8" transform="rotate(-10 12 17)"/>

  <!-- Carte arrière droite (inclinée +10°) -->
  <rect x="12" y="6" width="16" height="21" rx="2.5" fill="#3b82f6" transform="rotate(10 20 16)"/>

  <!-- Carte principale (blanche, au premier plan) -->
  <rect x="7" y="5" width="18" height="23" rx="2.5" fill="white"/>

  <!-- Pip haut gauche : chiffre + symbole -->
  <text x="9.5" y="12" font-family="Inter, system-ui, sans-serif" font-size="4.5" font-weight="800" fill="#2563eb">5</text>
  <text x="9.5" y="17" font-family="Inter, system-ui, sans-serif" font-size="4" fill="#2563eb">♠</text>

  <!-- Chiffre central -->
  <text x="16" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#2563eb">5</text>

  <!-- Pip bas droit retourné (180°) -->
  <text x="22.5" y="26" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="4.5" font-weight="800" fill="#2563eb" transform="rotate(180 20 24)">5</text>
  <text x="22.5" y="21" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="4" fill="#2563eb" transform="rotate(180 20 19)">♠</text>

</svg>
